<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.8, maximum-scale=1" />
    <title>OptimEarn - Play Games, Complete Offers & Surveys and Earn Rewards</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Only load analytics if the environment variables are set
      const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      
      if (endpoint && websiteId && !endpoint.includes("VITE_ANALYTICS_ENDPOINT")) {
        const script = document.createElement("script");
        script.async = true;
        script.defer = true;
        script.src = `${endpoint}/umami`;
        script.setAttribute("data-website-id", websiteId);
        document.head.appendChild(script);
      }
    </script>
  </body>

</html>
